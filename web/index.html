<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>FusionRL - выбор симулятора</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui;
            background: linear-gradient(145deg, #d4e4ff 0%, #b8d1f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(60, 110, 180, 0.3);
            text-align: center;
            max-width: 600px;
            border: 1px solid rgba(130, 170, 240, 0.6);
        }
        h1 {
            color: #1e3a6b;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: #eaf2ff;
            border-radius: 30px;
            padding: 30px;
            width: 200px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #bfd6ff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(63, 123, 192, 0.3);
            border-color: #3f7bc0;
        }
        .card h2 {
            color: #12315e;
            margin: 15px 0;
        }
        .card p {
            color: #2f4d8a;
            font-size: 0.9rem;
        }
        .icon {
            font-size: 4rem;
        }
        .footer {
            margin-top: 30px;
            color: #5a77a0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> FusionRL</h1>
        <p>Выберите режим симулятора:</p>
        
        <div class="buttons">
            <div class="card" onclick="window.location.href='simulator_auto.html'">
                <div class="icon"> </div>
                <h2>Автоматический</h2>
                <p>Агент обучается сам, без кнопок</p>
            </div>
            
            <div class="card" onclick="window.location.href='simulator_manual.html'">
                <div class="icon"> </div>
                <h2>Ручной</h2>
                <p>Нажимать "Обучить" для каждого эпизода</p>
            </div>
        </div>
        
        <div class="footer">
            Проект "Большие Вызовы" • Физика + RL
        </div>
    </div>
</body>
</html>
